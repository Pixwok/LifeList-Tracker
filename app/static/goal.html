<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <title>LifeList Tracker</title>
</head>
<body>
    <script type="module" src="/static/js/goal.js"></script>
    <main>
        <header class="header-page">
            <div class="header-right">
                <a href="/">
                    <svg fill="#E8EFF8" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="48px" height="48px" viewBox="0 0 495.398 495.398" xml:space="preserve">
                    <g><g><g>
                    <path d="M487.083,225.514l-75.08-75.08V63.704c0-15.682-12.708-28.391-28.413-28.391c-15.669,0-28.377,12.709-28.377,28.391
                        v29.941L299.31,37.74c-27.639-27.624-75.694-27.575-103.27,0.05L8.312,225.514c-11.082,11.104-11.082,29.071,0,40.158
                        c11.087,11.101,29.089,11.101,40.172,0l187.71-187.729c6.115-6.083,16.893-6.083,22.976-0.018l187.742,187.747
                        c5.567,5.551,12.825,8.312,20.081,8.312c7.271,0,14.541-2.764,20.091-8.312C498.17,254.586,498.17,236.619,487.083,225.514z"/>
                    <path d="M257.561,131.836c-5.454-5.451-14.285-5.451-19.723,0L72.712,296.913c-2.607,2.606-4.085,6.164-4.085,9.877v120.401
                        c0,28.253,22.908,51.16,51.16,51.16h81.754v-126.61h92.299v126.61h81.755c28.251,0,51.159-22.907,51.159-51.159V306.79
                        c0-3.713-1.465-7.271-4.085-9.877L257.561,131.836z"/>
                    </g></g></g>
                    </svg>
                </a>
                <h1 id="goal-name-title"></h1>
            </div>
            <div class="header-btn">
                <button id="create-task" class="btn btn-primary">Créer une tâche</button>
                <button id="edit-goal" class="btn btn-secondary">Modifier l'objectif</button>
                <button id="delete-goal" class="btn btn-danger">Supprimer l'objectif</button>
            </div>
        </header>
        <div id="goal-info">
            <!--Insertion JS-->
        </div>
        <div class="task-container">
            <div class="task-todo">
                <h2>Tâches en cours</h2>
                <ul id="taskTodo-List"></ul>
            </div>
            <div class="task-complete">
                <h2>Tâches terminées</h2>
                <ul id="taskComplete-List"></ul>
            </div>
        </div>
    </main>

    <!--Form edition objectif-->
    <div class="modal-overlay" id="modal-edit-goal">
        <div class="modal">
            <form id="form-edit-goal" class="modal-form">
                <label for="goal-name">Objectif</label>
                <input type="text" name="name" id="goal-name" class="input-form">
                <label for="goal-advancement">Avancement</label>
                <input type="text" name="advancement" id="goal-advancement" class="input-form">
                <label for="goal-deadline">Deadline</label>
                <input type="date" name="deadline" id="goal-deadline" class="input-form">
                <label for="goal-categorie">Catégorie</label>
                <select name="categorie_id" id="goal-categorie" class="select-form">
                </select>
                <input type="submit" value="Créer" class="btn btn-primary" id="goal-submit">
            </form>
        </div>
    </div>

    <!--Edition tâche-->
    <div class="modal-overlay" id="modal-edit-task">
        <div class="modal">
            <form id="form-edit-task" class="modal-form">
                <label for="task-name">Nom</label>
                <input type="text" name="name" id="task-name" class="input-form">
                <label for="task-desc">Description</label>
                <input type="text" name="description" id="task-desc" class="input-form">
                <label for="task-deadline">Deadline</label>
                <input type="date" name="deadline" id="task-deadline" class="input-form">
                <input type="submit" value="Créer" class="btn btn-primary" id="goal-submit">
            </form>
        </div>
    </div>

    <!--Suppression objectif-->
    <div class="modal-overlay" id="modal-delete-goal">
        <div class="modal">
            <p>Êtes vous sûre de couloir supprimer l'objectif avec l'ID : <strong id="goal-id"></strong></p>
            <div>
                <button class="btn btn-secondary" id="cancel-delete">Annuler</button>
                <button class="btn btn-danger" id="confirm-delete">Valider</button>
            </div>
        </div>
    </div>

</body>
</html>
