<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <title>LifeList Tracker</title>
</head>
<body>
    <script type="module" src="/static/js/main.js"></script>
    <nav id="navbar">
        <div id="burger-btn">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul id="navlink">
            <li><a href="#">Dashboard</a></li>
        </ul>
    </nav>
    <main>
        <header>
            <h1>LifeList Tracker</h1>
            <button id="create-obj" class="btn btn-primary">Ajouter un objectif</button>
        </header>
        <section class="dashboard-stats">
            <h2>Mes objectifs</h2>
            <div class="row">
                <div class="card">
                    <span>Objectifs actifs</span>
                    <h3 id="activeGoals"></h3>
                </div>
                <div class="card">
                    <span>Objectifs terminés</span>
                    <h3 id="goalsComplete"></h3>
                </div>
                <div class="card">
                    <span>Tâches à faire</span>
                    <h3 id="taskTodo"></h3>
                </div>
                <div class="card">
                    <span>Echéance à venir</span>
                    <h3 id="nextDeadLine"></h3>
                </div>
                <div class="card">
                    <span>Objectifs en retard</span>
                    <h3 id="lateGoal"></h3>
                </div>
            </div>
        </section>
        <section id="goals-list">

        </section>
    </main>
</body>
</html>
