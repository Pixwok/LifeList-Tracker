<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <title>LifeList Tracker</title>
</head>
<body>
    <script type="module" src="/static/js/main.js"></script>
    <main>
        <header class="header-page">
            <h1>LifeList Tracker</h1>
            <div class="header-btn">
                <button id="create-obj" class="btn btn-primary">Ajouter un objectif</button>
                <button id="create-category" class="btn btn-secondary">Ajouter une catégorie</button>
            </div>
        </header>
        <section class="dashboard-stats">
            <h2>Mes objectifs</h2>
            <div class="row">
                <div class="card">
                    <span>Objectifs actifs</span>
                    <h3 id="activeGoals"></h3>  
                </div>
                <div class="card">
                    <span>Objectifs terminés</span>
                    <h3 id="goalsComplete"></h3>
                </div>
                <div class="card">
                    <span>Tâches à faire</span>
                    <h3 id="taskTodo"></h3>
                </div>
                <div class="card">
                    <span>Echéance à venir</span>
                    <h3 id="nextDeadLine"></h3>
                </div>
                <div class="card">
                    <span>Objectifs en retard</span>
                    <h3 id="lateGoal"></h3>
                </div>
            </div>
        </section>
        <section id="goals-list">
            <!--Insertion card objectif JS-->
        </section>
    </main>

    <!--Form création objectifs-->
    <div class="modal-overlay" id="modal-create-goal">
        <div class="modal">
            <form id="form-create-goal" class="modal-form">
                <label for="goal-name">Objectif</label>
                <input type="text" name="name" id="goal-name" class="input-form">
                <label for="goal-deadline">Deadline</label>
                <input type="date" name="deadline" id="goal-deadline" class="input-form">
                <label for="goal-categorie">Catégorie</label>
                <select name="categorie" id="goal-categorie" class="select-form">
                </select>
                <input type="submit" value="Créer" class="btn btn-primary" id="goal-submit">
            </form>
        </div>
    </div>

    <!--Form création catégorie-->
    <div class="modal-overlay" id="modal-create-category">
        <div class="modal">
            <form id="form-create-category" class="modal-form">
                <label for="category-name">Nom</label>
                <input type="text" name="name" id="category-name" class="input-form">
                <input type="submit" value="Créer" class="btn btn-primary" id="category-submit">
            </form>
        </div>
    </div>
</body>
</html>
