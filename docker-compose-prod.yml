services:
  database:
    image: postgres:18.4
    container_name: lifelist-db
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${POSTGRES_TZ}
      PGTZ: ${POSTGRES_PGTZ}
    volumes:
      - ./db_data:/var/lib/postgresql
    restart: always
    networks:
      - backend_net
  backend:
    build:
      context: .
      dockerfile: Dockerfile.fastapi.prod
    container_name: lifelist-backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@lifelist-db:5432/${POSTGRES_DB}
    ports:
      - ${PORT_BACKEND}:8080
    restart: always
    depends_on:
      - database
    networks:
      - backend_net
      - frontend_net
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx.prod
    container_name: lifelist-nginx
    ports:
      - ${PORT_NGINX}:80
    restart: always
    depends_on:
      - backend
    networks:
      - frontend_net

networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge