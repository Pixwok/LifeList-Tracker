services:
  database:
    image: postgres:18.4
    container_name: lifelist-db
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${POSTGRES_TZ}
      PGTZ: ${POSTGRES_PGTZ}
    volumes:
      - ./db_data:/var/lib/postgresql
    restart: always
  backend:
    build: .
    image: python-fastapi
    container_name: lifelist-backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@lifelist-db:5432/${POSTGRES_DB}
    ports:
      - 8080:8080
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    depends_on:
      - database
  nginx:
    image: nginx:stable-alpine
    container_name: lifelist-nginx
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./app/static:/var/www/html
      - ./site.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend